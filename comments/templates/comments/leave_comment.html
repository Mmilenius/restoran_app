{% extends "includes/base.html" %}
{% load static %}

{% block content %}
<div class="max-w-2xl mx-auto px-4 py-12">
    <div class="bg-white rounded-3xl shadow-xl border border-gray-100 p-6 md:p-10">

        <div class="text-center mb-8">
            <div class="text-5xl mb-3">⭐</div>
            <h2 class="text-3xl font-bold text-gray-900">Оцініть нас, будь ласка!</h2>
            <p class="text-gray-500 mt-2 text-sm">Ваша думка допомагає нам ставати кращими</p>
        </div>

        <form method="post" class="
            [&_input]:w-full [&_input]:border [&_input]:border-gray-300 [&_input]:rounded-xl [&_input]:px-4 [&_input]:py-3 [&_input]:focus:ring-2 [&_input]:focus:ring-primary [&_input]:focus:border-primary [&_input]:transition [&_input]:bg-gray-50
            [&_textarea]:w-full [&_textarea]:border [&_textarea]:border-gray-300 [&_textarea]:rounded-xl [&_textarea]:px-4 [&_textarea]:py-3 [&_textarea]:focus:ring-2 [&_textarea]:focus:ring-primary [&_textarea]:focus:border-primary [&_textarea]:transition [&_textarea]:bg-gray-50
        ">
            {% csrf_token %}

            <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-5">
                <div>
                    <label class="block text-gray-700 font-semibold mb-2 text-sm">Оцінка страв (1-5) *</label>
                    <input type="number" name="food_rating" min="1" max="5" placeholder="5" required>
                </div>

                <div>
                    <label class="block text-gray-700 font-semibold mb-2 text-sm">Оцінка сервісу (1-5) *</label>
                    <input type="number" name="service_rating" min="1" max="5" placeholder="5" required>
                </div>
            </div>

            <div class="mb-5">
                <label class="block text-gray-700 font-semibold mb-2 text-sm">Ваш коментар *</label>
                <textarea name="text" rows="4" placeholder="Що вам сподобалося, а що можна покращити?" required></textarea>
            </div>

            <div class="mb-8">
                <label class="block text-gray-700 font-semibold mb-2 text-sm">Контакт (необов'язково)</label>
                <input type="text" name="contact" placeholder="Email або телефон для зворотного зв'язку">
            </div>

            <button type="submit" class="w-full bg-primary hover:bg-[#6B3410] text-white font-bold py-4 rounded-xl shadow-lg transition transform hover:-translate-y-1 text-lg flex justify-center items-center gap-2">
                <i class="fas fa-paper-plane"></i> Надіслати відгук
            </button>
        </form>

    </div>
</div>
{% endblock %}
